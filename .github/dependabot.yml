version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: daily
    groups:
      charm:
        patterns:
          - "charm.land/*"
          - "github.com/charmbracelet/*"
      golang-x:
        patterns:
          - "golang.org/x/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"